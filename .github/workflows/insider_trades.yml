name: OpenInsider Harvester - Insider Trades

on:
  schedule:
    # Runs at minute 0 past every 6th hour
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests pandas python-dateutil fastparquet pyarrow lxml html5lib bs4

    - name: Run OpenInsider Harvester
      run: python insider_trades.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Harvester"
        git add col4_insider_trades.parquet
        # Only commit if there are actual changes
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated OpenInsider Insider Trades data harvest"
        git push
