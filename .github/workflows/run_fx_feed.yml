name: G8 FX Telegram Feed
on:
  repository_dispatch:
    types: [trigger-fx-feed]
  workflow_dispatch:
jobs:
  execute-all-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests selenium webdriver-manager selenium-stealth yfinance pandas beautifulsoup4 cloudscraper pdfplumber telegraph

      - name: Run Market Scripts
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python fx_feed.py || true
          python fx_options.py || true
          python spdr_sectors.py || true
          python sp500.py || true
          python nasdaq.py || true
          python russell.py || true
          python bitcoin.py || true
          python metals.py || true
          python energy.py || true

      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add SPDR Sectors files
          if [ -f spdr_sectors_history.csv ]; then git add spdr_sectors_history.csv; fi
          if [ -f spdr_sectors_gist.txt ]; then git add spdr_sectors_gist.txt; fi
          
          # Add FX Options files
          if [ -f fx_options_history.csv ]; then git add fx_options_history.csv; fi
          if [ -f fx_options_gist.txt ]; then git add fx_options_gist.txt; fi
          
          # Add S&P 500 files
          if [ -f sp500_history.csv ]; then git add sp500_history.csv; fi
          if [ -f sp500_gist.txt ]; then git add sp500_gist.txt; fi
          
          # Add Russell 2000 files
          if [ -f russell_history.csv ]; then git add russell_history.csv; fi
          if [ -f russell_gist.txt ]; then git add russell_gist.txt; fi

          # Add Bitcoin files
          if [ -f bitcoin_history.csv ]; then git add bitcoin_history.csv; fi
          if [ -f bitcoin_gist.txt ]; then git add bitcoin_gist.txt; fi
          
          git commit -m "Automated update of market history [skip ci]" || exit 0
          git push
