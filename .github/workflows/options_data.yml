name: Options Data Harvester

on:
  schedule:
    # Runs at 23:00 UTC (Post-Market Close) Mon-Fri
    - cron: '0 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest-options:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas yfinance pyarrow fastparquet requests python-dateutil curl_cffi

      - name: Run Harvester
        run: python options_processor.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Harvester"
          git add col4_options_history.parquet
          git diff --quiet && git diff --staged --quiet || git commit -m "Update options history: NetOI & DeltaNetOI"
          git push
